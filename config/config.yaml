llm_server:
  url: "http://localhost:8084/v1"
  headers:
    Content-Type: "application/json"

models:
  stt_vosk:
    en: "models/stt_vosk/vosk-model-small-en-us-0.15"
    fr: "models/stt_vosk/vosk-model-small-fr-0.22"
  tts_piper:
    fr_upmc: "models/tts_piper/fr_FR-upmc-medium.onnx"
    fr_upmc_json: "models/tts_piper/fr_FR-upmc-medium.onnx.json"
  llm:
    qwen3.5_0_8b: "models/llm/Qwen3.5-0.8B-UD-Q4_K_XL.gguf"

executables:
  llama_server:
    win: "models/llama_cpp/llama-server.exe"
    linux: "models/llama_cpp/llama-server"
    args: "-m {model_path} --port 8084 -c 4096 --chat-template chatml --reasoning off --jinja"

testing:
  output_dir: "tests/output"
  run_integration_tests: true

# --- COMMANDES ROBOT QT ---
qt_robot:
  default_velocity: 20  # Vitesse par défaut (0-100)
  gestures:
    - "QT/hi"
    - "QT/bye"
    - "QT/wave"
    - "QT/nod"
    - "QT/shake_head"
    - "QT/thinking"
    - "QT/surprise"
    - "QT/angry"
    - "QT/kiss"
  emotions:
    - "QT/happy"
    - "QT/sad"
    - "QT/angry"
    - "QT/surprise"
    - "QT/neutral"